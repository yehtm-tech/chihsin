<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>七星潭尋寶任務</title>

  <!-- PWA Meta -->
  <meta name="theme-color" content="#050F1E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="七星潭">
  <meta name="description" content="探索七星潭，完成九項尋寶任務">

  <!-- PWA Manifest (inline) -->
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%E4%B8%83%E6%98%9F%E6%BD%AD%E5%B0%8B%E5%AF%B6%E4%BB%BB%E5%8B%99%22%2C%22short_name%22%3A%22%E4%B8%83%E6%98%9F%E6%BD%AD%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23050F1E%22%2C%22theme_color%22%3A%22%23050F1E%22%2C%22orientation%22%3A%22portrait%22%7D">

  <!-- Apple Touch Icon (SVG → base64) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23050F1E'/%3E%3Ctext x='90' y='118' text-anchor='middle' font-size='90'%3E🌊%3C/text%3E%3C/svg%3E">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    /* ─── Design Tokens ─── */
    :root {
      --navy:       #050F1E;
      --navy-mid:   #0A1F35;
      --navy-light: #112840;
      --teal:       #00C9B1;
      --teal-dim:   rgba(0, 201, 177, 0.15);
      --gold:       #F5A623;
      --gold-dim:   rgba(245, 166, 35, 0.15);
      --cream:      #E8EDF5;
      --muted:      rgba(232, 237, 245, 0.45);
      --success:    #00C9B1;
      --border:     rgba(255,255,255,0.07);
      --glass:      rgba(10, 31, 53, 0.85);
      --r-lg: 20px;
      --r-md: 14px;
      --r-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html { height: 100%; overscroll-behavior: none; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--cream);
      min-height: 100%;
      overflow-x: hidden;
    }

    /* ─── Splash Screen ─── */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--navy);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      transition: opacity 0.6s ease, visibility 0.6s;
    }
    #splash.fade-out { opacity: 0; visibility: hidden; }
    .splash-icon { font-size: 72px; animation: bob 2s ease-in-out infinite; }
    .splash-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 900;
      background: linear-gradient(135deg, var(--teal), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    .splash-dots { display: flex; gap: 8px; margin-top: 10px; }
    .splash-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--teal); opacity: 0.3;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }
    .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
    .splash-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* ─── App Shell ─── */
    #app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    /* ─── Header ─── */
    .app-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 14px;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .header-badge {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: var(--teal); text-transform: uppercase;
    }
    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 900;
      background: linear-gradient(135deg, var(--cream) 40%, var(--teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-top: 2px;
    }
    .progress-ring-wrap { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
    .progress-ring { transform: rotate(-90deg); }
    .progress-ring-bg { fill: none; stroke: var(--navy-light); stroke-width: 3; }
    .progress-ring-fill {
      fill: none; stroke: var(--teal); stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 113;
      stroke-dashoffset: 113;
      transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .progress-ring-text {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--teal);
      line-height: 1;
    }

    /* ─── Scroll Content ─── */
    .scroll-content { flex: 1; overflow-y: auto; padding: 20px 16px 140px; }

    /* ─── Group Name Card ─── */
    .group-card {
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 18px;
      margin-bottom: 20px;
      position: relative; overflow: hidden;
    }
    .group-card::before {
      content: '';
      position: absolute; top: -30px; right: -30px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, var(--teal-dim) 0%, transparent 70%);
      pointer-events: none;
    }
    .group-card label {
      display: block;
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      color: var(--teal); text-transform: uppercase;
      margin-bottom: 10px;
    }
    .group-card input {
      width: 100%;
      background: var(--navy-light);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px; font-weight: 600;
      color: var(--cream);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .group-card input::placeholder { color: var(--muted); font-weight: 400; }
    .group-card input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(0,201,177,0.12);
    }

    /* ─── Section Label ─── */
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: var(--muted); text-transform: uppercase;
      margin: 0 4px 12px;
    }

    /* ─── Task Cards ─── */
    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-card {
      background: var(--navy-mid);
      border: 1.5px solid var(--border);
      border-radius: var(--r-lg);
      padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s, background 0.2s;
      position: relative; overflow: hidden;
      animation: card-in 0.4s ease both;
    }
    .task-card:nth-child(1) { animation-delay: 0.05s; }
    .task-card:nth-child(2) { animation-delay: 0.10s; }
    .task-card:nth-child(3) { animation-delay: 0.15s; }
    .task-card:nth-child(4) { animation-delay: 0.20s; }
    .task-card:nth-child(5) { animation-delay: 0.25s; }
    .task-card:nth-child(6) { animation-delay: 0.30s; }
    .task-card:nth-child(7) { animation-delay: 0.35s; }
    .task-card:nth-child(8) { animation-delay: 0.40s; }
    .task-card:nth-child(9) { animation-delay: 0.45s; }

    .task-card:active { transform: scale(0.97); }

    .task-card.completed {
      border-color: rgba(0,201,177,0.35);
      background: linear-gradient(135deg, var(--navy-mid), rgba(0,201,177,0.06));
    }
    .task-card.completed::after {
      content: '';
      position: absolute; top: 0; left: 0; bottom: 0;
      width: 3px;
      background: var(--teal);
      border-radius: 3px 0 0 3px;
    }

    .task-num-wrap {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--navy-light);
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 17px; font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      transition: all 0.3s;
    }
    .task-card.completed .task-num-wrap {
      background: var(--teal-dim);
      border-color: var(--teal);
      color: var(--teal);
    }

    .task-text { flex: 1; min-width: 0; }
    .task-name { font-size: 15px; font-weight: 600; color: var(--cream); line-height: 1.3; }
    .task-sub {
      font-size: 12px; color: var(--muted);
      margin-top: 3px;
    }
    .task-card.completed .task-name { color: var(--cream); }

    .task-arrow {
      font-size: 18px; color: var(--muted);
      transition: color 0.2s, transform 0.2s;
    }
    .task-card.completed .task-arrow { color: var(--teal); }
    .task-card:active .task-arrow { transform: translateX(3px); }

    /* ─── Bottom Action Bar ─── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 430px;
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      z-index: 100;
    }
    .btn-submit {
      width: 100%; padding: 17px;
      background: linear-gradient(135deg, #007A6E, var(--teal));
      color: var(--navy); font-family: 'DM Sans', sans-serif;
      font-size: 16px; font-weight: 700;
      border: none; border-radius: var(--r-lg);
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,201,177,0.25);
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled {
      background: var(--navy-light);
      color: var(--muted);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ─── Modal ─── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(5, 15, 30, 0.75);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }
    .modal-overlay.open { opacity: 1; visibility: visible; }

    .modal-sheet {
      background: var(--navy-mid);
      width: 100%; max-width: 430px;
      height: 92dvh; height: 92vh;
      border-radius: 24px 24px 0 0;
      display: flex; flex-direction: column;
      border: 1px solid var(--border);
      border-bottom: none;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }

    .modal-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-top-row { display: flex; align-items: center; justify-content: space-between; }
    .modal-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      color: var(--gold); text-transform: uppercase;
      background: var(--gold-dim);
      padding: 4px 10px; border-radius: 20px;
    }
    .modal-close-btn {
      width: 34px; height: 34px;
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--muted);
      cursor: pointer; line-height: 1;
    }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 900;
      color: var(--cream);
      margin-top: 10px; line-height: 1.25;
    }

    .modal-body {
      flex: 1; overflow-y: auto;
      padding: 18px 20px;
      scroll-behavior: smooth;
    }

    .lore-card {
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-left: 3px solid var(--teal);
      border-radius: var(--r-md);
      padding: 16px;
      font-size: 14px; line-height: 1.75;
      color: rgba(232,237,245,0.8);
      white-space: pre-wrap;
      margin-bottom: 22px;
      position: relative;
    }
    .lore-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      color: var(--teal); text-transform: uppercase;
      margin-bottom: 8px; display: block;
    }

    .questions-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      color: var(--gold); text-transform: uppercase;
      margin-bottom: 14px; display: block;
    }

    .question-block { margin-bottom: 18px; }
    .question-block label {
      display: block;
      font-size: 14px; font-weight: 600;
      color: var(--cream); margin-bottom: 8px; line-height: 1.4;
    }
    .question-block textarea {
      width: 100%;
      background: var(--navy-light);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; color: var(--cream);
      outline: none; resize: none;
      min-height: 90px;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .question-block textarea::placeholder { color: var(--muted); }
    .question-block textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(0,201,177,0.1);
    }

    .modal-footer {
      padding: 12px 20px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--navy-mid);
    }
    .btn-save {
      width: 100%; padding: 16px;
      background: var(--navy-light);
      border: 1.5px solid var(--teal);
      color: var(--teal);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px; font-weight: 700;
      border-radius: var(--r-lg);
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-save:active { transform: scale(0.98); background: var(--teal-dim); }

    /* ─── Loading Overlay ─── */
    #loading-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(5, 15, 30, 0.9);
      backdrop-filter: blur(8px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      opacity: 0; visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }
    #loading-overlay.show { opacity: 1; visibility: visible; }
    .spinner-ring {
      width: 52px; height: 52px;
      border: 3px solid var(--navy-light);
      border-top: 3px solid var(--teal);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .loading-msg {
      font-size: 15px; font-weight: 600;
      color: var(--muted); letter-spacing: 0.5px;
    }

    /* ─── Install Banner ─── */
    #install-banner {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      width: calc(100% - 32px); max-width: 398px;
      background: linear-gradient(135deg, var(--navy-light), var(--navy-mid));
      border: 1px solid var(--teal);
      border-radius: var(--r-lg);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      z-index: 150;
      opacity: 0; visibility: hidden;
      transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #install-banner.show {
      opacity: 1; visibility: visible;
      transform: translateX(-50%) translateY(0);
    }
    .install-icon { font-size: 28px; flex-shrink: 0; }
    .install-text { flex: 1; }
    .install-text strong { display: block; font-size: 14px; font-weight: 700; color: var(--cream); }
    .install-text span { font-size: 12px; color: var(--muted); }
    .install-btn {
      background: var(--teal); color: var(--navy);
      border: none; border-radius: var(--r-sm);
      padding: 8px 14px; font-size: 13px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
    }
    .install-dismiss {
      background: none; border: none; color: var(--muted);
      font-size: 20px; cursor: pointer; padding: 0 0 0 4px;
      line-height: 1;
    }

    /* ─── GAS URL Config Card ─── */
    .config-card {
      background: var(--gold-dim);
      border: 1.5px dashed rgba(245,166,35,0.4);
      border-radius: var(--r-lg);
      padding: 16px 18px;
      margin-bottom: 20px;
    }
    .config-card label {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      color: var(--gold); text-transform: uppercase;
      margin-bottom: 10px;
    }
    .config-card input {
      width: 100%;
      background: var(--navy);
      border: 1.5px solid rgba(245,166,35,0.3);
      border-radius: var(--r-md);
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: var(--cream);
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .config-card input::placeholder { color: var(--muted); font-size: 12px; }
    .config-card input:focus { border-color: var(--gold); }
    .config-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }

    /* ─── Wave Background ─── */
    .wave-bg {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 200px; pointer-events: none; z-index: 0;
      opacity: 0.04;
    }

    /* ─── Keyframes ─── */
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── SweetAlert2 Dark Override ─── */
    .swal2-popup {
      background: var(--navy-mid) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--r-lg) !important;
      color: var(--cream) !important;
      font-family: 'DM Sans', sans-serif !important;
    }
    .swal2-title { color: var(--cream) !important; font-family: 'Playfair Display', serif !important; }
    .swal2-html-container { color: var(--muted) !important; }
    .swal2-confirm { background: var(--teal) !important; color: var(--navy) !important; font-weight: 700 !important; border-radius: var(--r-md) !important; }
    .swal2-cancel { background: var(--navy-light) !important; color: var(--muted) !important; border-radius: var(--r-md) !important; }
    .swal2-icon { border-color: var(--teal) !important; }
    .swal2-icon.swal2-success { border-color: var(--teal) !important; }
    .swal2-icon.swal2-success [class^=swal2-success-line] { background: var(--teal) !important; }
    .swal2-icon.swal2-success .swal2-success-ring { border-color: var(--teal-dim) !important; }
    .swal2-toast { background: var(--navy-light) !important; }
    .swal2-toast .swal2-title { color: var(--cream) !important; }
  </style>
</head>
<body>

  <!-- Splash -->
  <div id="splash">
    <div class="splash-icon">🌊</div>
    <div class="splash-title">七星潭尋寶任務</div>
    <div class="splash-dots"><span></span><span></span><span></span></div>
  </div>

  <!-- Wave Background -->
  <svg class="wave-bg" viewBox="0 0 1440 200" preserveAspectRatio="none">
    <path fill="var(--teal)" d="M0,100 C360,180 1080,20 1440,100 L1440,200 L0,200Z"/>
  </svg>

  <!-- App Shell -->
  <div id="app">

    <!-- Header -->
    <header class="app-header">
      <div class="header-top">
        <div>
          <div class="header-badge">🧭 探索任務</div>
          <div class="header-title">七星潭尋寶</div>
        </div>
        <div class="progress-ring-wrap">
          <svg class="progress-ring" width="44" height="44">
            <circle class="progress-ring-bg" cx="22" cy="22" r="18"/>
            <circle class="progress-ring-fill" id="ring-fill" cx="22" cy="22" r="18"/>
          </svg>
          <div class="progress-ring-text">
            <span id="progress-num">0</span>
            <span style="font-size:9px;opacity:0.5">/9</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Scroll Content -->
    <div class="scroll-content">

      <!-- GAS URL Config -->
      <div class="config-card">
        <label>⚙️ 伺服器設定</label>
        <input type="url" id="gas-url" placeholder="貼上你的 Google Apps Script 網址..." autocomplete="off">
        <div class="config-hint">📌 部署 GAS Web App 後，將網址貼於此處即可送出資料</div>
      </div>

      <!-- Group Name -->
      <div class="group-card">
        <label>👥 小隊名稱</label>
        <input type="text" id="groupName" placeholder="例如：第七小隊" autocomplete="off">
      </div>

      <!-- Task List -->
      <div class="section-label">— 9 項任務 —</div>
      <div class="task-list" id="task-list"></div>

    </div>

    <!-- Bottom Action Bar -->
    <div class="bottom-bar">
      <button class="btn-submit" id="btn-submit" disabled onclick="handleSubmit()">
        🚀 送出最終任務報告
      </button>
    </div>

  </div><!-- /app -->

  <!-- Task Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal-sheet" id="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-top-row">
          <span class="modal-badge" id="modal-badge">任務 1</span>
          <button class="modal-close-btn" onclick="closeModal()">×</button>
        </div>
        <h2 class="modal-title" id="modal-title">任務標題</h2>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn-save" onclick="saveAndClose()">💾 儲存答案並返回</button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading-overlay">
    <div class="spinner-ring"></div>
    <div class="loading-msg">資料傳送中...</div>
  </div>

  <!-- Install Banner -->
  <div id="install-banner">
    <div class="install-icon">📲</div>
    <div class="install-text">
      <strong>安裝為 App</strong>
      <span>加入主畫面，離線也能使用</span>
    </div>
    <button class="install-btn" onclick="doInstall()">安裝</button>
    <button class="install-dismiss" onclick="dismissInstall()">×</button>
  </div>

  <script>
  // ─────────────────────────────────────────
  //  TASKS DATA
  // ─────────────────────────────────────────
  const TASKS = [
    {
      id: 1, title: "七星潭地名的由來",
      sub: "歷史與神話",
      lore: `地名的由來有二個說法：\n一說是在此地仰望夜空，北斗七星最為明亮之緣故。\n另一說根據歷史考據，從前七星潭聚落位置在花蓮機場與東華大學美崙校區一帶，有七個較大的湖泊。後因興建北飛行場將窪地填平，居民遷至海灣一帶，仍自稱「七星潭人」。\n\n【神話傳說】以前佳山上有條青龍變成白面書生，愛上已婚的山地姑娘並害死其丈夫。真相敗露後，青龍被村民追打到海邊，死後變成大石頭(青石公)，並發出七道光飛天，加上海灣形狀像潭，故命名。`,
      questions: ["現在的「七星潭」為什麼不是潭，而是在海邊呢？"]
    },
    {
      id: 2, title: "探訪四八高地戰備坑道",
      sub: "軍事歷史",
      lore: `你知道七星潭除了美麗的海景，還有一條鮮為人知的軍事坑道嗎？這是在二次世界大戰期間建立的軍事防線。`,
      questions: ["了解七星潭軍事坑道二戰歷史背景？(請簡述你觀察到的重點)"]
    },
    {
      id: 3, title: "定置漁場",
      sub: "海洋產業",
      lore: `花蓮七星潭定置漁業，帶來太平洋超新鮮現流水產。這是臺灣在地友善海洋生態的漁法，在利用珍貴海洋資源的同時，致力於傳達永續海洋的精神。`,
      questions: ["什麼是定置漁場？", "七星潭有哪些定置漁場？"]
    },
    {
      id: 4, title: "鎮星宮",
      sub: "宗教文化",
      lore: `似若嶄新，卻潛藏古老的智慧底蘊。寶藏蹤跡？求神問卜或許是好辦法。`,
      questions: ["這間廟主神拜誰？", "這間廟有何特色？", "你在這間廟附近發現了什麼？"]
    },
    {
      id: 5, title: "牽罟亭",
      sub: "漁村生活",
      lore: `濱海生活小日子。牽罟亭是賞日落好望角，浪人於此徘迴，不知所尋為何？`,
      questions: ["什麼是牽罟的捕魚方式？", "你認為牽罟沒落的原因有哪些？"]
    },
    {
      id: 6, title: "七星柴魚博物館",
      sub: "文化保存",
      lore: `「生活即是文化」並不因為結束而塵封消失。余老為了讓歷史得到見證，讓當地居民有個聚會、回憶場所，也為了讓更多年輕朋友了解台灣這與海共生的海洋民族性。`,
      questions: ["七星潭柴魚是由哪一種魚製成？", "七星潭全盛時期有 6 家柴魚工廠，為什麼這裡適合成立柴魚工廠？"]
    },
    {
      id: 7, title: "漁村建築",
      sub: "建築特色",
      lore: `因應氣候而產生的特殊建築形式，具有分散冬季風力與阻斷飛沙之功能。`,
      questions: ["特色漁村蛻變，七星潭民宿急速成長，你認為會對當地造成怎樣的影響？"]
    },
    {
      id: 8, title: "七星潭民宿",
      sub: "觀光產業",
      lore: `自由自在展翅飛、悠悠天地任我行。旅行可以有很多理由，可以有很多方式，最重要的就是勇敢踏出腳步。`,
      questions: ["訪問民宿主人，目前七星潭疫情以來觀光狀況好不好？"]
    },
    {
      id: 9, title: "自行車出租店",
      sub: "休閒體驗",
      lore: `七星潭擁有美麗的自行車道，騎著單車迎著海風是絕佳的體驗。`,
      questions: ["各式單車租車費用各是多少錢？"]
    }
  ];

  const TOTAL = TASKS.length;
  const LS_GROUP   = 'cst_group';
  const LS_ANSWERS = 'cst_answers';
  const LS_GASURL  = 'cst_gasurl';

  let answers = {};
  let openTaskId = null;
  let deferredPrompt = null;

  // ─────────────────────────────────────────
  //  INIT
  // ─────────────────────────────────────────
  window.addEventListener('load', () => {
    // Restore saved data
    const savedGroup = localStorage.getItem(LS_GROUP);
    const savedAns   = localStorage.getItem(LS_ANSWERS);
    const savedUrl   = localStorage.getItem(LS_GASURL);

    if (savedGroup) document.getElementById('groupName').value = savedGroup;
    if (savedAns)   answers = JSON.parse(savedAns);
    if (savedUrl)   document.getElementById('gas-url').value = savedUrl;

    // Listen for changes
    document.getElementById('groupName').addEventListener('input', onInput);
    document.getElementById('gas-url').addEventListener('input', () => {
      localStorage.setItem(LS_GASURL, document.getElementById('gas-url').value.trim());
    });

    renderTasks();
    updateProgress();

    // Hide splash
    setTimeout(() => {
      document.getElementById('splash').classList.add('fade-out');
    }, 1200);

    // Register SW
    registerSW();
  });

  // PWA Install
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(() => {
      document.getElementById('install-banner').classList.add('show');
    }, 3000);
  });

  function doInstall() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      dismissInstall();
    });
  }
  function dismissInstall() {
    document.getElementById('install-banner').classList.remove('show');
  }

  // ─────────────────────────────────────────
  //  HELPERS
  // ─────────────────────────────────────────
  function isCompleted(taskId) {
    const task = TASKS.find(t => t.id === taskId);
    const raw  = answers[`task${taskId}`] || '';
    const parts = raw.split('|||');
    return task.questions.every((_, i) => parts[i] && parts[i].trim() !== '');
  }

  function onInput() {
    const group = document.getElementById('groupName').value;
    localStorage.setItem(LS_GROUP, group);
    localStorage.setItem(LS_ANSWERS, JSON.stringify(answers));
    updateProgress();
  }

  function updateProgress() {
    const count = TASKS.filter(t => isCompleted(t.id)).length;
    const group = document.getElementById('groupName').value.trim();

    document.getElementById('progress-num').textContent = count;

    // Ring
    const circumference = 2 * Math.PI * 18; // r=18
    const offset = circumference - (count / TOTAL) * circumference;
    document.getElementById('ring-fill').style.strokeDashoffset = offset;

    // Submit btn
    document.getElementById('btn-submit').disabled = !(count > 0 && group);
  }

  // ─────────────────────────────────────────
  //  RENDER TASKS
  // ─────────────────────────────────────────
  function renderTasks() {
    const list = document.getElementById('task-list');
    list.innerHTML = TASKS.map(task => {
      const done = isCompleted(task.id);
      return `
        <div class="task-card ${done ? 'completed' : ''}" onclick="openTask(${task.id})">
          <div class="task-num-wrap">${task.id}</div>
          <div class="task-text">
            <div class="task-name">${task.title}</div>
            <div class="task-sub">${task.sub} · ${task.questions.length} 題${done ? ' · ✓ 已完成' : ''}</div>
          </div>
          <div class="task-arrow">${done ? '✓' : '›'}</div>
        </div>
      `;
    }).join('');
  }

  // ─────────────────────────────────────────
  //  MODAL
  // ─────────────────────────────────────────
  function openTask(taskId) {
    openTaskId = taskId;
    const task = TASKS.find(t => t.id === taskId);

    document.getElementById('modal-badge').textContent  = `任務 ${task.id}`;
    document.getElementById('modal-title').textContent  = task.title;

    const saved = (answers[`task${taskId}`] || '').split('|||');

    document.getElementById('modal-body').innerHTML = `
      <div class="lore-card">
        <span class="lore-label">📖 背景知識</span>
        ${escapeHtml(task.lore)}
      </div>
      <span class="questions-label">✏️ 任務問題</span>
      ${task.questions.map((q, i) => `
        <div class="question-block">
          <label>${i + 1}. ${q}</label>
          <textarea id="q_${i}" placeholder="請在此輸入你們的發現...">${escapeHtml(saved[i] || '')}</textarea>
        </div>
      `).join('')}
    `;

    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    if (navigator.vibrate) navigator.vibrate(8);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
    openTaskId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  function saveAndClose() {
    if (!openTaskId) return;
    const task = TASKS.find(t => t.id === openTaskId);
    const parts = task.questions.map((_, i) =>
      document.getElementById(`q_${i}`).value.trim()
    );
    const combined = parts.join('|||');
    answers[`task${openTaskId}`] = combined.replace(/\|{3}/g, '') === '' ? '' : combined;

    localStorage.setItem(LS_ANSWERS, JSON.stringify(answers));
    updateProgress();
    renderTasks();
    closeModal();
    if (navigator.vibrate) navigator.vibrate([8, 40, 8]);

    Swal.fire({
      icon: 'success', title: '進度已儲存！',
      timer: 1000, showConfirmButton: false,
      toast: true, position: 'top-end'
    });
  }

  // ─────────────────────────────────────────
  //  SUBMIT
  // ─────────────────────────────────────────
  async function handleSubmit() {
    const group  = document.getElementById('groupName').value.trim();
    const gasUrl = document.getElementById('gas-url').value.trim();

    if (!group) { Swal.fire({ icon: 'warning', title: '請填寫小隊名稱', toast: true, position: 'top', timer: 2000, showConfirmButton: false }); return; }
    if (!gasUrl) { Swal.fire({ icon: 'warning', title: '請填寫伺服器網址', text: '在頂部「伺服器設定」貼上 GAS 網址', confirmButtonText: '了解' }); return; }

    const { isConfirmed } = await Swal.fire({
      title: '確定送出任務報告？',
      html: `<span style="color:rgba(232,237,245,0.6)">小隊：${escapeHtml(group)}<br>送出後將無法修改</span>`,
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: '確定送出',
      cancelButtonText: '再檢查一下',
    });
    if (!isConfirmed) return;

    // Build payload
    const formattedAnswers = {};
    for (let i = 1; i <= TOTAL; i++) {
      const raw = answers[`task${i}`] || '';
      formattedAnswers[`task${i}`] = raw.split('|||')
        .filter(a => a)
        .map((a, idx) => `A${idx + 1}: ${a}`)
        .join('\n');
    }

    const payload = { groupName: group, answers: formattedAnswers };

    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    document.getElementById('loading-overlay').classList.add('show');

    const timeoutId = setTimeout(() => {
      document.getElementById('loading-overlay').classList.remove('show');
      btn.disabled = false;
      Swal.fire({ icon: 'error', title: '連線逾時', text: '請確認網路狀態後重試。' });
    }, 15000);

    try {
      const res = await fetch(gasUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      clearTimeout(timeoutId);
      document.getElementById('loading-overlay').classList.remove('show');

      const json = await res.json();
      if (json.success) {
        if (navigator.vibrate) navigator.vibrate([50, 80, 50, 80, 100]);
        await Swal.fire({ icon: 'success', title: '🎉 任務完成！', text: json.message });
        localStorage.removeItem(LS_GROUP);
        localStorage.removeItem(LS_ANSWERS);
        // btn stays disabled after success
      } else {
        btn.disabled = false;
        Swal.fire({ icon: 'error', title: '傳送失敗', text: json.message });
      }
    } catch (err) {
      clearTimeout(timeoutId);
      document.getElementById('loading-overlay').classList.remove('show');
      btn.disabled = false;
      Swal.fire({ icon: 'error', title: '連線錯誤', text: err.message || '請確認網路連線與 GAS 網址是否正確。' });
    }
  }

  // ─────────────────────────────────────────
  //  UTILS
  // ─────────────────────────────────────────
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ─────────────────────────────────────────
  //  SERVICE WORKER (via Blob)
  // ─────────────────────────────────────────
  function registerSW() {
    if (!('serviceWorker' in navigator)) return;
    const swCode = `
      const CACHE = 'cst-v1';
      const ASSETS = [self.registration.scope];
      self.addEventListener('install', e => {
        e.waitUntil(
          caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting())
        );
      });
      self.addEventListener('activate', e => {
        e.waitUntil(clients.claim());
      });
      self.addEventListener('fetch', e => {
        if (e.request.mode === 'navigate') {
          e.respondWith(
            fetch(e.request).catch(() => caches.match(e.request))
          );
        }
      });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(() => {});
  }

  // ─────────────────────────────────────────
  //  GAS BACKEND ADAPTER
  //  (也支援 google.script.run，如果部署在 GAS 內)
  // ─────────────────────────────────────────
  // NOTE: If deploying inside GAS, replace the fetch() in handleSubmit()
  // with google.script.run.withSuccessHandler(...).submitAnswers(payload)
  </script>
</body>
</html>
